<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication App</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 2rem auto; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 0.5rem; box-sizing: border-box; }
        button { width: 100%; padding: 0.5rem; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        #result { margin-top: 1rem; padding: 1rem; background: #f8f9fa; border: 1px solid #dee2e6; display: none; }
    </style>
</head>
<body>

    <h1>Multiply Numbers</h1>
    
    <form id="multiplyForm">
        <div class="form-group">
            <label for="num1">First Number:</label>
            <input type="number" id="num1" name="num1" required>
        </div>
        <div class="form-group">
            <label for="num2">Second Number:</label>
            <input type="number" id="num2" name="num2" required>
        </div>
        <button type="submit">Calculate</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('multiplyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get the numeric values from the form
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            const resultDiv = document.getElementById('result');

            try {
                // Send JSON payload to our new Express endpoint
                const response = await fetch('/api/multiply', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ num1, num2 })
                });

                const data = await response.json();

                resultDiv.style.display = 'block';
                if (response.ok) {
                    resultDiv.textContent = `Result: ${data.result}`;
                    resultDiv.style.color = '#155724';
                    resultDiv.style.backgroundColor = '#d4edda';
                    resultDiv.style.borderColor = '#c3e6cb';
                } else {
                    resultDiv.textContent = `Error: ${data.error}`;
                    resultDiv.style.color = '#721c24';
                    resultDiv.style.backgroundColor = '#f8d7da';
                }
            } catch (err) {
                resultDiv.style.display = 'block';
                resultDiv.textContent = `Error connecting to server.`;
                resultDiv.style.color = '#721c24';
                resultDiv.style.backgroundColor = '#f8d7da';
            }
        });
    </script>
</body>
</html>
