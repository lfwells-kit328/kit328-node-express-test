services:
  frontend:
    build: ./frontend
    networks:
      - caddy_network

    ports:
      - "8080:3000"

    labels:
      # Caddy sees this and handles EVERYTHING (SSL + Routing)
      caddy: lfwells-kit328-node-express-test.gctrg-platform.cloud.edu.au
      caddy.reverse_proxy: "{{upstreams 3000}}"

networks:
  caddy_network:
    external: true